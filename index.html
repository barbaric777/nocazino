<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>Личный кабинет</title>
    <style>
      body {
        background: #3627bd;
        color: white;
        font-family: sans-serif;
        text-align: center;
        padding-top: 50px;
      }
      .card {
        background: #2c1f96;
        display: inline-block;
        padding: 40px;
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      }
      .balance-display {
        font-size: 48px;
        color: #0ff11a;
        margin: 20px 0;
        font-weight: bold;
      }
      input {
        padding: 10px;
        border-radius: 5px;
        border: none;
        width: 150px;
        font-size: 16px;
        outline: none;
      }
      button {
        padding: 10px 20px;
        background: #15b357;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 16px;
        transition: 0.2s;
      }
      button:hover {
        opacity: 0.8;
      }
      .back-link {
        margin-top: 30px;
        display: block;
        color: #69b4ff;
        text-decoration: none;
      }
      .back-link:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <button
        onclick="resetBalance()"
        style="background: #f10f0f; margin-bottom: 20px"
      >
        Обнулить всё
      </button>

      <h1>Деньги</h1>
      <div class="balance-display"><span id="profile-balance">0</span> ₽</div>

      <input type="number" id="deposit-amount" placeholder="Сумма" min="1" />
      <button onclick="deposit()">Пополнить</button>

      <a href="rfpbr/слоты.html" class="back-link"
        ><img src="emoji.png" alt="" />
      </a>
    </div>

    <script>
      const balanceDisplay = document.getElementById("profile-balance");
      const depositInput = document.getElementById("deposit-amount");


      function getSavedBalance() {
        const saved = localStorage.getItem("userBalance");
        return saved ? parseInt(saved) : 0; 
      }


      function updateDisplay() {
        balanceDisplay.innerText = getSavedBalance();
      }


      function deposit() {
        const amount = parseInt(depositInput.value);

        if (isNaN(amount) || amount <= 0) {
          alert("Введите корректную сумму!");
          return;
        }

        const newBalance = getSavedBalance() + amount;
        localStorage.setItem("userBalance", newBalance);

        updateDisplay(); 
        depositInput.value = ""; 
      }

      
      function resetBalance() {
        if (confirm("Вы уверены, что хотите обнулить баланс?")) {
          localStorage.setItem("userBalance", 0);
          updateDisplay();
        }
      }


      updateDisplay();
    </script>
  </body>
</html>
