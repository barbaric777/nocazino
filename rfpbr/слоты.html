<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>слоты</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="game-container">
      <div class="balance-board">Баланс: <span id="balance">0</span> ₽</div>

        <div class="reel" id="reel2"></div>

      <div id="message"></div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
